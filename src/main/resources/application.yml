spring:
  application:
    name: order-management-service

  # ── Database: H2 in-memory (default — no Docker, no setup, Java only) ────────
  datasource:
    url: jdbc:h2:mem:ordermanagement;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration/h2

  # ── Kafka: disabled by default — demo runs Java-only ─────────────────────────
  # Kafka beans are still compiled (needed for Activity 3 code review demo)
  # but the broker connection is never attempted at startup.
  # Enable by activating the 'kafka' profile: -Dspring.profiles.active=kafka
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  h2:
    console:
      enabled: true
      path: /h2-console

order:
  max-total: 50000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.company.ordermanagement: INFO
    org.springframework.kafka: WARN
    org.flywaydb: WARN
